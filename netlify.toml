# Netlify configuration for the Vite + React portfolio
# Netlify reads this automatically — no need to type build settings in the UI.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 7 needs Node 20.19+ or 22.12+. Netlify's default can be older, so pin it.
  NODE_VERSION = "22"

# Single-page app: serve index.html for any path (safe even for this one-page site)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible security headers — a nice touch for a cyber-security portfolio.
# (No strict CSP here so Google Fonts / the GitHub avatar keep working.)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
